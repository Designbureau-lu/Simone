<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMONE – Wave Graphic Mapper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<aside id="performanceOverview" class="performance-overview" aria-label="Performance overview">
    <div class="performance-overview-header">
        <span>Performance Meter</span>
        <button type="button" data-performance-toggle aria-expanded="false" aria-label="Expand Performance Meter">▸</button>
    </div>
    <div data-performance-body hidden>
        <pre data-performance-output>PERFORMANCE
Load artwork to begin measuring.</pre>
        <button type="button" data-reset-worst>Reset Worst</button>
    </div>
</aside>

<div class="container">

    <h1>SIMONE</h1>
    <p class="subtitle">Wave Graphic Mapper</p>

    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="developer-viewport-control">
        <label for="viewportPositionInput">Viewport Position</label>
        <input type="range" id="viewportPositionInput" min="0" max="100" value="0" step="0.1">
        <output id="viewportPositionValue" for="viewportPositionInput">0% · X 0 projected px</output>
    </div>

    <div class="controls" aria-label="Periodic surface controls">
        <label for="minimumVisibleFactorInput">Minimum Visible Factor</label>
        <input type="range" id="minimumVisibleFactorInput" min="0" max="100" value="20" step="1">
        <input type="number" id="minimumVisibleFactorNumber" min="0" max="100" value="20" step="1" aria-label="Minimum Visible Factor value">
        <span>%</span>

        <label for="maximumVisibleFactorInput">Maximum Visible Factor</label>
        <input type="range" id="maximumVisibleFactorInput" min="0" max="100" value="90" step="1">
        <input type="number" id="maximumVisibleFactorNumber" min="0" max="100" value="90" step="1" aria-label="Maximum Visible Factor value">
        <span>%</span>

        <label for="resetCurtainStateInput">Reset Curtain State</label>
        <input type="range" id="resetCurtainStateInput" min="0" max="100" value="50" step="0.1">
        <input type="number" id="resetCurtainStateNumber" min="20" max="90" value="55" step="1" aria-label="Reset Curtain State value">
        <span>%</span>

        <label for="carrierDistanceInput">Carrier distance</label>
        <input type="range" id="carrierDistanceInput" min="20" max="300" value="100" step="1">
        <input type="number" id="carrierDistanceNumber" min="20" max="300" value="100" step="1" aria-label="Carrier distance value">
        <span>mm</span>

        <label for="modelTransitionInput">Model transition</label>
        <input type="range" id="modelTransitionInput" min="0" max="100" value="60" step="1">
        <input type="number" id="modelTransitionNumber" min="0" max="100" value="60" step="1" aria-label="Model transition value">
        <span>%</span>
    </div>

    <div id="curtainPresentation" class="curtain-presentation">
        <canvas id="canvas"></canvas>
    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
